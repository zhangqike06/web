<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户登录 - 本草寻源</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-page">

  <!-- 登录页背景 -->
  <div class="login-bg"></div>

  <!-- 毛玻璃登录卡片 -->
  <div class="login-card" id="login-card">
    <div class="login-header">
      <img src="images/logo.svg" alt="logo" width="60">
      <h2>本草寻源</h2>
      <p>探寻千年中医药智慧</p>
    </div>

    <form class="login-form" id="login-form" onsubmit="return false;">
      <div class="form-group">
        <label for="username">账号</label>
        <input type="text" id="username" placeholder="请输入账号" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="请输入密码">
      </div>
      <div class="form-group">
        <label for="captcha">验证码</label>
        <div class="captcha-row">
          <input type="text" id="captcha-input" placeholder="请输入验证码">
          <canvas id="captcha-canvas" width="100" height="36"></canvas>
          <button type="button" class="captcha-refresh" id="captcha-refresh" title="换一张">&#8635;</button>
        </div>
      </div>
      <div class="form-error" id="form-error"></div>
      <button type="submit" class="btn btn-primary login-btn" id="login-btn">登录</button>
    </form>

    <div class="login-hint">
      <p>提示：账号和密码均为 <strong>admin</strong></p>
    </div>
  </div>

  <!-- 登录后专区（默认隐藏） -->
  <div class="user-zone" id="user-zone" style="display:none;">
    <div class="container">
      <div class="zone-header">
        <h2>御医专区</h2>
        <p>欢迎回来，<span id="zone-username">admin</span></p>
        <button class="btn btn-outline" id="logout-btn">退出登录</button>
      </div>

      <div class="zone-grid">
        <!-- 收藏夹 -->
        <div class="zone-card">
          <h3>我的草药收藏</h3>
          <div id="favorites-list">
            <p class="empty-hint">登录本草百科页，点击药材详情中的"收藏"按钮，即可在此查看。</p>
          </div>
        </div>

        <!-- 体质档案 -->
        <div class="zone-card">
          <h3>我的体质档案</h3>
          <div id="constitution-record">
            <p class="empty-hint">完成养生保健页中的体质测试后，结果将自动保存于此。</p>
          </div>
        </div>

        <!-- 打卡日历 -->
        <div class="zone-card">
          <h3>每日打卡</h3>
          <div id="checkin-area">
            <p>连续打卡：<strong id="streak-days">0</strong> 天</p>
            <button class="btn btn-primary" id="checkin-btn">今日打卡</button>
          </div>
        </div>

        <!-- 笔记本 -->
        <div class="zone-card">
          <h3>养生笔记</h3>
          <textarea id="notes-area" placeholder="记录您的养生心得..."></textarea>
          <button class="btn btn-primary" id="save-notes-btn">保存笔记</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="site-footer" style="position:absolute;bottom:0;width:100%;background:rgba(255,255,255,0.5);">
    <div class="footer-brand">本草寻源</div>
    <p class="footer-info">中国石油大学（北京）2025—2026春季学期 · Web程序设计大作业</p>
  </footer>

  <script src="javascript/login.js"></script>
</body>
</html>
